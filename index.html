<style>
    body {
        background-color: #0b1326;
        color: #dae2fd;
        font-family: 'Geist', sans-serif;
    }

    /* ── Glassmorphism Panels ── */
    .glass-panel {
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(70, 69, 84, 0.5);
        transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .glass-panel:hover {
        border-color: rgba(70, 69, 84, 0.8);
    }
    .glass-panel-elevated {
        background: rgba(23, 31, 51, 0.6);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(70, 69, 84, 0.4);
        box-shadow: 0px 20px 40px rgba(99, 102, 241, 0.08);
    }

    /* ── Ambient Background Glows ── */
    .ambient-glow {
        position: fixed;
        width: 60vw;
        height: 60vh;
        background: radial-gradient(circle, rgba(128, 131, 255, 0.12) 0%, rgba(11, 19, 38, 0) 70%);
        top: -15vh;
        left: 20vw;
        z-index: 0;
        pointer-events: none;
    }
    .ambient-glow--secondary {
        width: 40vw;
        height: 40vh;
        background: radial-gradient(circle, rgba(111, 0, 190, 0.08) 0%, rgba(11, 19, 38, 0) 70%);
        top: auto;
        bottom: -10vh;
        left: auto;
        right: 10vw;
    }

    /* ── Glow Button Effect ── */
    .glow-button {
        transition: all 0.3s ease;
    }
    .glow-button:hover {
        box-shadow: 0 0 20px rgba(128, 131, 255, 0.35), 0 0 40px rgba(128, 131, 255, 0.15);
        transform: translateY(-1px);
    }
    .glow-button:active {
        transform: scale(0.97);
    }

    /* ── Gradient Text ── */
    .gradient-text {
        background: linear-gradient(135deg, #c0c1ff 0%, #ddb7ff 50%, #ffb2b7 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .gradient-text-brand {
        background: linear-gradient(135deg, #c0c1ff 0%, #8083ff 50%, #6f00be 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    /* ── Gradient Borders ── */
    .gradient-border {
        position: relative;
    }
    .gradient-border::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(135deg, rgba(128, 131, 255, 0.4), rgba(111, 0, 190, 0.3), rgba(255, 81, 106, 0.2));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
    }

    /* ── Skeleton Shimmer ── */
    .skeleton {
        background: linear-gradient(90deg, rgba(45, 52, 73, 0.4) 25%, rgba(49, 57, 77, 0.6) 50%, rgba(45, 52, 73, 0.4) 75%);
        background-size: 200% 100%;
        animation: shimmer 2s ease-in-out infinite;
        border-radius: 0.5rem;
    }

    /* ── Progress Bar Fill ── */
    .progress-fill {
        background: linear-gradient(90deg, #8083ff, #c0c1ff);
        transition: width 0.4s ease;
    }

    /* ── Scrollbar Styling ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0b1326; }
    ::-webkit-scrollbar-thumb { background: #2d3449; border-radius: 9999px; }
    ::-webkit-scrollbar-thumb:hover { background: #464554; }

    /* ── Selection ── */
    ::selection {
        background: rgba(128, 131, 255, 0.3);
        color: #e1e0ff;
    }

    /* ── Stagger animation delays for cards ── */
    .stagger-1 { animation-delay: 0.1s; animation-fill-mode: both; }
    .stagger-2 { animation-delay: 0.2s; animation-fill-mode: both; }
    .stagger-3 { animation-delay: 0.3s; animation-fill-mode: both; }
    .stagger-4 { animation-delay: 0.4s; animation-fill-mode: both; }

    /* ── Light Mode Inversion ── */
    html.light {
        filter: invert(1) hue-rotate(180deg);
        background-color: white;
    }
    
    /* Re-invert media so images/avatars don't look like negatives */
    html.light img, 
    html.light video,
    html.light .icon-no-invert {
        filter: invert(1) hue-rotate(180deg);
    }
</style>
